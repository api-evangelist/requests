aid: requests
name: Requests
description: >-
  Requests is a simple and elegant HTTP library for Python, designed for human beings.
  Published under the Apache2 license by the Python Software Foundation (PSF), it is
  one of the most downloaded Python packages with approximately 300 million weekly
  downloads and over 4 million dependent repositories. Requests abstracts urllib3
  to provide idiomatic HTTP method functions (get, post, put, patch, delete, head,
  options), persistent Sessions with connection pooling, automatic content decompression,
  TLS/SSL verification, Basic and Digest authentication, cookie persistence,
  streaming downloads, multipart file uploads, SOCKS proxy support, and configurable
  timeouts. Current stable version: 2.33.1 (March 2026). Supports Python 3.10+.
